name: Mirror → custom-data-buddy (Lovable)

on:
  push:
    branches:
      - main

jobs:
  mirror:
    name: Push main → Helder-Evous/custom-data-buddy
    runs-on: ubuntu-latest
    # Só roda se o push NÃO veio do próprio bot de espelhamento (evita loop)
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout completo (com histórico)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configurar credenciais e identidade Git
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
        run: |
          git config user.name  "hub-3s-care mirror"
          git config user.email "noreply@github.com"
          git config --global credential.helper store
          echo "https://oauth2:${MIRROR_PAT}@github.com" > ~/.git-credentials

      - name: Enviar main para o espelho
        run: |
          git push https://github.com/Helder-Evous/custom-data-buddy.git main:main --force
          git push https://github.com/Helder-Evous/custom-data-buddy.git main:claude/gracious-goldberg-VbxZ0 --force
