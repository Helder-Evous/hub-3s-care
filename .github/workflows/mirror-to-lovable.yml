name: Mirror → custom-data-buddy (Lovable)

on:
  push:
    branches:
      - main

jobs:
  mirror:
    name: Push main → Helder-Evous/custom-data-buddy
    runs-on: ubuntu-latest
    # Só roda se o push NÃO veio do próprio bot de espelhamento (evita loop)
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout completo (com histórico)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar identidade Git
        run: |
          git config user.name  "hub-3s-care mirror"
          git config user.email "noreply@github.com"

      - name: Adicionar remote do espelho
        run: |
          git remote add mirror \
            https://x-access-token:${{ secrets.MIRROR_PAT }}@github.com/Helder-Evous/custom-data-buddy.git

      - name: Enviar main para o espelho
        run: |
          git push mirror main:main --force
